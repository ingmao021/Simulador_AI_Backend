# Server - Render asigna el puerto dinamicamente
server.port=${PORT:8080}
server.address=0.0.0.0

# PostgreSQL - prioriza variables estandar de Spring
spring.datasource.url=${SPRING_DATASOURCE_URL:${DATABASE_URL:}}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${DB_USERNAME:}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:}}
spring.h2.console.enabled=false

# Evita autodeteccion por metadata JDBC cuando el contenedor inicia
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.boot.allow_jdbc_metadata_access=false

# CORS (produccion)
app.cors.allowed-origins=${ALLOWED_ORIGINS}

# Seguridad
spring.jpa.show-sql=false
