services:
  - type: web
    name: ai-proxy-backend
    env: java
    region: oregon
    plan: free
    buildCommand: mvn clean package -DskipTests
    startCommand: >
      java -Dspring.profiles.active=prod
           -jar target/ai-proxy-backend-0.0.1-SNAPSHOT.jar
    healthCheckPath: /api/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: PORT
        value: 8080
      - key: ALLOWED_ORIGINS
        sync: false        # Se configura manualmente en Render
      - key: DATABASE_URL
        fromDatabase:
          name: ai-proxy-db
          property: connectionString
      - key: DB_USERNAME
        fromDatabase:
          name: ai-proxy-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: ai-proxy-db
          property: password

databases:
  - name: ai-proxy-db
    databaseName: aiproxy
    user: aiproxyuser
    plan: free

